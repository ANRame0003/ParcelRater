services:

  backend:
    build: ./backend
    container_name: ratefinder-backend
    restart: unless-stopped
    # Only accessible inside Docker network (nginx proxies to it)
    # Remove the 'ports' block below if you don't need direct API access
    ports:
      - "8000:8000"       # Optional: exposes Swagger UI at http://localhost:8000/docs
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 10s

  frontend:
    build: ./frontend
    container_name: ratefinder-frontend
    restart: unless-stopped
    ports:
      - "3005:80"         # App available at http://localhost:3005
    depends_on:
      backend:
        condition: service_healthy
